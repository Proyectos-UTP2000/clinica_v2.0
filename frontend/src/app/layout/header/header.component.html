<header class="app-header">
  <div class="header-title-container">
    <button type="button" class="btn-toggle-sidebar" (click)="onToggleSidebar()" aria-label="Abrir menú de navegación">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    <div>
      <p class="header-kicker">Panel interno</p>
      <h1>Centro de control clínico</h1>
    </div>
  </div>

  <div class="user-actions">
    <div class="sede-selector-wrapper">
      <select class="form-select form-select-sm" [(ngModel)]="selectedSedeId" aria-label="Seleccionar sede activa">
        @if (esAdmin) {
          <option [ngValue]="null">Todas las Sedes</option>
        }
        @for (sede of sedes$ | async; track sede.id) {
          <option [ngValue]="sede.id">{{ sede.nombre }}</option>
        }
      </select>
    </div>
    <span class="operation-day">{{ fechaOperativa }}</span>
    <span class="user-name">{{ nombreUsuario }}</span>
    <a class="btn btn-outline-primary btn-sm me-2 text-decoration-none" routerLink="/mi-perfil">
      Mi Perfil
    </a>
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="cerrarSesion()">
      Cerrar sesión
    </button>
  </div>
</header>
