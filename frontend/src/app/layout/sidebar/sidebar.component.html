<aside class="sidebar" aria-label="Navegación principal">
  <div class="sidebar-brand">
    <span class="brand-mark" aria-hidden="true">CL</span>
    <div class="flex-grow-1">
      <strong>Clinica interna</strong>
      <small>Operación multisede</small>
    </div>
    <button type="button" class="btn-close-sidebar" (click)="onLinkClick()" aria-label="Cerrar menú de navegación">✕</button>
  </div>

  <nav class="sidebar-nav">
    @for (group of groups; track group) {
      <section class="nav-group" [hidden]="visiblesPorGrupo(group).length === 0">
        <p class="nav-group-label">{{ group }}</p>
        @for (item of visiblesPorGrupo(group); track item) {
          <a
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.exact || false }"
            (click)="onLinkClick()"
            >
            <span class="nav-code" aria-hidden="true">{{ item.code }}</span>
            <span>{{ item.label }}</span>
          </a>
        }
      </section>
    }
  </nav>
</aside>
