<section class="feature-page">
  <app-page-header
    kicker="Especialidades"
    [title]="especialidadId ? 'Editar especialidad' : 'Nueva especialidad'"
    description="Defina especialidades y subespecialidades medicas."
  ></app-page-header>

  @if (mensajeError) {
    <div class="alert alert-danger" role="alert">{{ mensajeError }}</div>
  }
  @if (cargando) {
    <div class="loading-state">Cargando especialidad...</div>
  }

  @if (!cargando) {
    <form class="feature-panel" [formGroup]="especialidadForm" (ngSubmit)="guardar()">
      <div class="feature-panel-body form-grid">
        <label class="form-label">
          Nombre
          <input class="form-control" formControlName="nombre" />
        </label>
        <div>
          <label class="form-label mb-1">
            Especialidad padre
            <select class="form-select" formControlName="especialidadPadreId">
              <option [ngValue]="null">Principal</option>
              @for (especialidad of especialidadesPadreDisponibles; track especialidad.id) {
                <option [ngValue]="especialidad.id">{{ especialidad.nombre }}</option>
              }
            </select>
          </label>
          <div class="form-check form-switch">
            <input id="soloPrincipalesDropdown" type="checkbox" class="form-check-input" [(ngModel)]="soloPrincipalesDropdown" [ngModelOptions]="{standalone: true}" />
            <label for="soloPrincipalesDropdown" class="form-check-label text-muted" style="font-size: 0.8rem;">Filtrar solo especialidades principales</label>
          </div>
        </div>
        <label class="form-label grid-span-2">
          Descripcion
          <textarea class="form-control" rows="3" formControlName="descripcion"></textarea>
        </label>
        <div class="form-actions grid-span-2">
          <a class="btn btn-outline-secondary" routerLink="/especialidades">Cancelar</a>
          <button class="btn btn-primary" type="submit" [disabled]="guardando">
            {{ guardando ? 'Guardando...' : 'Guardar especialidad' }}
          </button>
        </div>
      </div>
    </form>
  }
</section>
