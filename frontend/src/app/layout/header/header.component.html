<header class="app-header">
  <div>
    <p class="header-kicker">Panel interno</p>
    <h1>Centro de control clinico</h1>
  </div>

  <div class="user-actions">
    <div class="sede-selector-wrapper">
      <select class="form-select form-select-sm" [value]="selectedSedeId || ''" (change)="onSedeChange($event)" aria-label="Seleccionar sede activa">
        <option value="">Todas las Sedes</option>
        @for (sede of sedes$ | async; track sede.id) {
          <option [value]="sede.id">{{ sede.nombre }}</option>
        }
      </select>
    </div>
    <span class="operation-day">{{ fechaOperativa }}</span>
    <span class="user-name">{{ nombreUsuario }}</span>
    <button type="button" class="btn btn-outline-secondary btn-sm" (click)="cerrarSesion()">
      Cerrar sesion
    </button>
  </div>
</header>
